  <script>
    (() => {
      const saved = localStorage.getItem("portfolio-theme");
      const dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      if (saved === "dark" || (!saved && dark)) {
        document.documentElement.dataset.theme = "dark";
      }
    })();
  </script>
